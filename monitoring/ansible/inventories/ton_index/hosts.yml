---
all:
  vars:
    ansible_user: ubuntu
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_ssh_common_args: "-o StrictHostKeyChecking=accept-new"
  children:
    monitoring_stack:
      children:
        hot_postgres:
          hosts:
            hot-db-01.example.internal:
            hot-db-02.example.internal:
        cold_postgres:
          hosts:
            cold-db-01.example.internal:
            cold-db-02.example.internal:
        kvrocks:
          hosts:
            kvrocks-01.example.internal:
            kvrocks-02.example.internal:
            kvrocks-03.example.internal:
    postgresql:
      children:
        hot_postgres:
        cold_postgres:
    monitoring:
      hosts:
        monitoring-01.example.internal:
          monitoring_cluster: monitoring
          monitoring_tier: monitoring
