        sentinel parallel-syncs kvrocks-main 1
        EOF
        exec redis-server /data/sentinel.conf --sentinel
    volumes:
      - sentinel2-data:/data
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:26380:26379"

  sentinel-3:
    <<: *sentinel-common
    container_name: sentinel-3
    environment:
      KVROCKS_PASSWORD: ${KVROCKS_PASSWORD:?Set KVROCKS_PASSWORD in .env}
    networks:
      kvrocks-net:
        ipv4_address: 172.20.0.23
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        cat > /data/sentinel.conf <<EOF
        port 26379
        protected-mode no
        dir /data

        sentinel resolve-hostnames no
        sentinel announce-hostnames no
        sentinel announce-ip 172.20.0.23

        sentinel monitor kvrocks-main 172.20.0.11 6666 2
        sentinel auth-pass kvrocks-main $${KVROCKS_PASSWORD}
        sentinel down-after-milliseconds kvrocks-main 5000
        sentinel failover-timeout kvrocks-main 60000
        sentinel parallel-syncs kvrocks-main 1
        EOF
        exec redis-server /data/sentinel.conf --sentinel
    volumes:
      - sentinel3-data:/data
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:26381:26379"

  redis-cli:
    image: redis:7.2-alpine
    profiles: [tools]
    environment:
      REDISCLI_AUTH: ${KVROCKS_PASSWORD:?Set KVROCKS_PASSWORD in .env}
    networks: [kvrocks-net]
    entrypoint:
      - redis-cli

