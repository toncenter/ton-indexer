# docker-compose.yml
# Local development Patroni cluster with PostgreSQL 18:
# - 3-node etcd DCS
# - 3-node Patroni/PostgreSQL cluster
# - HAProxy endpoint:
#   - localhost:5000 -> current primary
#   - localhost:5001 -> replicas
#   - localhost:7000 -> HAProxy stats
# - 3-node cold Patroni/PostgreSQL cluster:
#   - localhost:5010 -> current cold primary
#   - localhost:5011 -> cold replicas
#   - localhost:7010 -> cold HAProxy stats
# - Hot-to-cold logical replication bootstrap:
#   - creates publication/subscription after both schemas exist
#   - keeps hot synchronized_standby_slots aligned with active hot replicas
# - 3-node Kvrocks cluster with Redis Sentinel:
#   - localhost:6666 -> kvrocks-1
#   - localhost:6667 -> kvrocks-2
#   - localhost:6668 -> kvrocks-3
#   - localhost:26379-26381 -> sentinels
#
# Security defaults:
# - published ports bind to 127.0.0.1 unless PATRONI_BIND_ADDR is set
# - database and Kvrocks passwords must be provided via environment/.env

x-kvrocks-common: &kvrocks-common
  image: apache/kvrocks:2.14.0
  restart: unless-stopped
  networks: [kvrocks-net]
  ulimits:
    nofile:
      soft: 100000
      hard: 100000

x-sentinel-common: &sentinel-common
  image: redis:7.2-alpine
  restart: unless-stopped
  depends_on:
    - kvrocks-1
    - kvrocks-2
    - kvrocks-3
  networks: [kvrocks-net]

x-patroni-env: &patroni-env
  PATRONI_SCOPE: pg18-dev
  PATRONI_DATA_DIR: /var/lib/postgresql/18/docker
  PG_ADMIN_PASSWORD: ${PATRONI_ADMIN_PASSWORD:?Set PATRONI_ADMIN_PASSWORD in .env}
  POSTGRES_SUPERUSER_PASSWORD: ${PATRONI_POSTGRES_PASSWORD:?Set PATRONI_POSTGRES_PASSWORD in .env}
  POSTGRES_REPLICATION_PASSWORD: ${PATRONI_REPLICATION_PASSWORD:?Set PATRONI_REPLICATION_PASSWORD in .env}
  POSTGRES_REWIND_PASSWORD: ${PATRONI_REWIND_PASSWORD:?Set PATRONI_REWIND_PASSWORD in .env}

services:
  etcd1:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: etcd1
    command:
      - /usr/local/bin/etcd
      - --name=etcd1
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd1:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd1:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-token=patroni-etcd
      - --initial-cluster-state=new
    volumes:
      - etcd1_data:/etcd-data
    networks: [pgnet]

  etcd2:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: etcd2
    command:
      - /usr/local/bin/etcd
      - --name=etcd2
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd2:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd2:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-token=patroni-etcd
      - --initial-cluster-state=new
    volumes:
      - etcd2_data:/etcd-data
    networks: [pgnet]

  etcd3:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: etcd3
    command:
      - /usr/local/bin/etcd
      - --name=etcd3
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd3:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd3:2380
      - --initial-cluster=etcd1=http://etcd1:2380,etcd2=http://etcd2:2380,etcd3=http://etcd3:2380
      - --initial-cluster-token=patroni-etcd
      - --initial-cluster-state=new
    volumes:
      - etcd3_data:/etcd-data
    networks: [pgnet]

  patroni1:
    <<: &patroni-common
      build:
        context: .
        dockerfile: Dockerfile
        target: patroni-postgres
      image: local/patroni-postgres:18
      entrypoint: ["/bin/bash", "-ec"]
      command:
        - |
          mkdir -p "$${PATRONI_DATA_DIR}" /var/run/postgresql
          chown -R postgres:postgres /var/lib/postgresql /var/run/postgresql
          chmod 700 "$${PATRONI_DATA_DIR}"
          rm -f /tmp/post_bootstrap.sh /tmp/patroni.yml

          cat > /tmp/post_bootstrap.sh <<'EOF'
          #!/bin/bash
          set -euo pipefail

          psql -v ON_ERROR_STOP=1 -U postgres -d postgres \
            -v admin_password="$${PG_ADMIN_PASSWORD}" \
            -v rewind_password="$${POSTGRES_REWIND_PASSWORD}" <<'SQL'
          SELECT format('CREATE ROLE admin WITH LOGIN CREATEROLE CREATEDB PASSWORD %L', :'admin_password')
          WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'admin')\gexec
          ALTER ROLE admin WITH CREATEROLE CREATEDB PASSWORD :'admin_password';

          SELECT format('CREATE ROLE rewind_user WITH LOGIN SUPERUSER PASSWORD %L', :'rewind_password')
          WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'rewind_user')\gexec
          ALTER ROLE rewind_user WITH SUPERUSER PASSWORD :'rewind_password';
          SQL
          EOF
          chown postgres:postgres /tmp/post_bootstrap.sh
          chmod 700 /tmp/post_bootstrap.sh

          cat > /tmp/patroni.yml <<EOF
          scope: $${PATRONI_SCOPE}
          namespace: /service/
          name: $${PATRONI_NAME}

          restapi:
            listen: 0.0.0.0:8008
            connect_address: $${PATRONI_NAME}:8008

          etcd3:
            hosts: etcd1:2379,etcd2:2379,etcd3:2379

          bootstrap:
            post_bootstrap: /tmp/post_bootstrap.sh
            dcs:
              ttl: 30
              loop_wait: 10
              retry_timeout: 10
              maximum_lag_on_failover: 1048576
              postgresql:
                use_pg_rewind: true
                use_slots: true
                parameters:
                  wal_level: logical
                  hot_standby: "on"
                  hot_standby_feedback: "on"
                  sync_replication_slots: "on"
                  max_wal_senders: 20
                  max_replication_slots: 20
                  max_worker_processes: 32
                  max_logical_replication_workers: 16
                  max_sync_workers_per_subscription: 8
                  max_active_replication_origins: 20
                  max_connections: 200
                  shared_buffers: 256MB
            initdb:
              - encoding: UTF8
              - data-checksums
            pg_hba:
              - host all all 0.0.0.0/0 scram-sha-256
              - host replication replicator 0.0.0.0/0 scram-sha-256

          postgresql:
            listen: 0.0.0.0:5432
            connect_address: $${PATRONI_NAME}:5432
            data_dir: $${PATRONI_DATA_DIR}
            bin_dir: /usr/lib/postgresql/18/bin
            authentication:
              superuser:
                username: postgres
                password: "$${POSTGRES_SUPERUSER_PASSWORD}"
              replication:
                username: replicator
                password: "$${POSTGRES_REPLICATION_PASSWORD}"
              rewind:
                username: rewind_user
                password: "$${POSTGRES_REWIND_PASSWORD}"
            parameters:
              unix_socket_directories: /var/run/postgresql
              wal_level: logical
              hot_standby: "on"
              hot_standby_feedback: "on"
              sync_replication_slots: "on"
              max_wal_senders: 20
              max_replication_slots: 20
              max_worker_processes: 32
              max_logical_replication_workers: 16
              max_sync_workers_per_subscription: 8
              max_active_replication_origins: 20

          tags:
            nofailover: false
            noloadbalance: false
            clonefrom: false
            nosync: false
          EOF

          exec gosu postgres patroni /tmp/patroni.yml
      depends_on:
        - etcd1
        - etcd2
        - etcd3
      networks: [pgnet]
    container_name: patroni1
    hostname: patroni1
    environment:
      <<: *patroni-env
      PATRONI_NAME: patroni1
    volumes:
      - patroni1_data:/var/lib/postgresql
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:8001:8008"
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:5433:5432"

  patroni2:
    <<: *patroni-common
    container_name: patroni2
    hostname: patroni2
    environment:
      <<: *patroni-env
      PATRONI_NAME: patroni2
    volumes:
      - patroni2_data:/var/lib/postgresql
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:8002:8008"
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:5434:5432"

  patroni3:
    <<: *patroni-common
    container_name: patroni3
    hostname: patroni3
    environment:
      <<: *patroni-env
      PATRONI_NAME: patroni3
    volumes:
      - patroni3_data:/var/lib/postgresql
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:8003:8008"
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:5435:5432"

  haproxy:
    image: haproxy:2.9
    container_name: haproxy-pg18
    depends_on:
      - patroni1
      - patroni2
      - patroni3
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        cat > /tmp/haproxy.cfg <<'EOF'
        global
            maxconn 1000
            log stdout format raw local0

        defaults
            log global
            mode tcp
            retries 2
            timeout connect 5s
            timeout client  1h
            timeout server  1h

        listen stats
            mode http
            bind *:7000
            stats enable
            stats uri /

        frontend pg_primary
            bind *:5000
            default_backend pg_primary_backend

        backend pg_primary_backend
            option httpchk GET /primary
            http-check expect status 200
            default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions
            server patroni1 patroni1:5432 check port 8008
            server patroni2 patroni2:5432 check port 8008
            server patroni3 patroni3:5432 check port 8008

        frontend pg_replicas
            bind *:5001
            default_backend pg_replicas_backend

        backend pg_replicas_backend
            balance roundrobin
            option httpchk GET /replica
            http-check expect status 200
            default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions
            server patroni1 patroni1:5432 check port 8008
            server patroni2 patroni2:5432 check port 8008
            server patroni3 patroni3:5432 check port 8008
        EOF

        exec haproxy -f /tmp/haproxy.cfg
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:5000:5000"
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:5001:5001"
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:7000:7000"
    networks: [pgnet]

  patroni-cold1:
    <<: *patroni-common
    container_name: patroni-cold1
    hostname: patroni-cold1
    environment:
      <<: *patroni-env
      PATRONI_SCOPE: pg18-cold-dev
      PATRONI_NAME: patroni-cold1
    volumes:
      - patroni-cold1_data:/var/lib/postgresql
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:8011:8008"
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:5443:5432"

  patroni-cold2:
    <<: *patroni-common
    container_name: patroni-cold2
    hostname: patroni-cold2
    environment:
      <<: *patroni-env
      PATRONI_SCOPE: pg18-cold-dev
      PATRONI_NAME: patroni-cold2
    volumes:
      - patroni-cold2_data:/var/lib/postgresql
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:8012:8008"
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:5444:5432"

  patroni-cold3:
    <<: *patroni-common
    container_name: patroni-cold3
    hostname: patroni-cold3
    environment:
      <<: *patroni-env
      PATRONI_SCOPE: pg18-cold-dev
      PATRONI_NAME: patroni-cold3
    volumes:
      - patroni-cold3_data:/var/lib/postgresql
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:8013:8008"
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:5445:5432"

  haproxy-cold:
    image: haproxy:2.9
    container_name: haproxy-pg18-cold
    depends_on:
      - patroni-cold1
      - patroni-cold2
      - patroni-cold3
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        cat > /tmp/haproxy.cfg <<'EOF'
        global
            maxconn 1000
            log stdout format raw local0

        defaults
            log global
            mode tcp
            retries 2
            timeout connect 5s
            timeout client  1h
            timeout server  1h

        listen stats
            mode http
            bind *:7000
            stats enable
            stats uri /

        frontend pg_primary
            bind *:5000
            default_backend pg_primary_backend

        backend pg_primary_backend
            option httpchk GET /primary
            http-check expect status 200
            default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions
            server patroni-cold1 patroni-cold1:5432 check port 8008
            server patroni-cold2 patroni-cold2:5432 check port 8008
            server patroni-cold3 patroni-cold3:5432 check port 8008

        frontend pg_replicas
            bind *:5001
            default_backend pg_replicas_backend

        backend pg_replicas_backend
            balance roundrobin
            option httpchk GET /replica
            http-check expect status 200
            default-server inter 2s fall 3 rise 2 on-marked-down shutdown-sessions
            server patroni-cold1 patroni-cold1:5432 check port 8008
            server patroni-cold2 patroni-cold2:5432 check port 8008
            server patroni-cold3 patroni-cold3:5432 check port 8008
        EOF

        exec haproxy -f /tmp/haproxy.cfg
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:5010:5000"
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:5011:5001"
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:7010:7000"
    networks: [pgnet]

  pg-hot-cold-logical-replication:
    image: postgres:18
    container_name: pg-hot-cold-logical-replication
    restart: unless-stopped
    depends_on:
      - haproxy
      - haproxy-cold
    environment:
      POSTGRES_SUPERUSER_PASSWORD: ${PATRONI_POSTGRES_PASSWORD:?Set PATRONI_POSTGRES_PASSWORD in .env}
      LOGICAL_REPLICATION_PASSWORD: ${PATRONI_REPLICATION_PASSWORD:?Set PATRONI_REPLICATION_PASSWORD in .env}
      LOGICAL_REPLICATION_DB: ${POSTGRES_DB:-ton_index}
    networks: [pgnet]
    entrypoint: ["/bin/bash", "-ec"]
    command:
      - |
        HOT_HOST=haproxy
        HOT_PORT=5000
        COLD_HOST=haproxy-cold
        COLD_PORT=5000
        DB_NAME="$${LOGICAL_REPLICATION_DB:-ton_index}"
        SUPERUSER=postgres
        REPLICATION_USER=logical_repl
        PUBLICATION=ton_hot_to_cold_pub
        SUBSCRIPTION=ton_hot_to_cold_sub
        SUBSCRIPTION_SLOT=ton_hot_to_cold
        TABLES="blocks shard_state transactions messages jetton_transfers jetton_burns nft_transfers traces actions action_accounts nominator_pool_events nominator_pool_validator_events validator_events"
        TABLES_CSV="blocks, shard_state, transactions, messages, jetton_transfers, jetton_burns, nft_transfers, traces, actions, action_accounts, nominator_pool_events, nominator_pool_validator_events, validator_events"
        TABLES_VALUES="('blocks'),('shard_state'),('transactions'),('messages'),('jetton_transfers'),('jetton_burns'),('nft_transfers'),('traces'),('actions'),('action_accounts'),('nominator_pool_events'),('nominator_pool_validator_events'),('validator_events')"
        REQUIRED_TABLES=13

        psql_hot() {
          PGPASSWORD="$${POSTGRES_SUPERUSER_PASSWORD}" psql -v ON_ERROR_STOP=1 \
            -h "$${HOT_HOST}" -p "$${HOT_PORT}" -U "$${SUPERUSER}" -d "$${DB_NAME}" "$${@}"
        }

        psql_cold() {
          PGPASSWORD="$${POSTGRES_SUPERUSER_PASSWORD}" psql -v ON_ERROR_STOP=1 \
            -h "$${COLD_HOST}" -p "$${COLD_PORT}" -U "$${SUPERUSER}" -d "$${DB_NAME}" "$${@}"
        }

        wait_for_primary() {
          local name="$$1"
          local host="$$2"
          local port="$$3"
          until PGPASSWORD="$${POSTGRES_SUPERUSER_PASSWORD}" pg_isready \
              -h "$${host}" -p "$${port}" -U "$${SUPERUSER}" -d "$${DB_NAME}" >/dev/null 2>&1; do
            echo "Waiting for $${name} primary at $${host}:$${port}..."
            sleep 2
          done
        }

        existing_table_count() {
          local side="$$1"
          if [ "$${side}" = "hot" ]; then
            psql_hot -Atc "SELECT count(*) FROM (VALUES $${TABLES_VALUES}) AS t(name) WHERE to_regclass('public.' || name) IS NOT NULL;"
          else
            psql_cold -Atc "SELECT count(*) FROM (VALUES $${TABLES_VALUES}) AS t(name) WHERE to_regclass('public.' || name) IS NOT NULL;"
          fi
        }

        wait_for_schemas() {
          while true; do
            hot_count="$$(existing_table_count hot || echo 0)"
            cold_count="$$(existing_table_count cold || echo 0)"
            if [ "$${hot_count}" = "$${REQUIRED_TABLES}" ] && [ "$${cold_count}" = "$${REQUIRED_TABLES}" ]; then
              return
            fi
            echo "Waiting for hot/cold schemas before logical replication setup: hot=$${hot_count}/$${REQUIRED_TABLES}, cold=$${cold_count}/$${REQUIRED_TABLES}"
            sleep 5
          done
        }

        configure_hot_slots_guard() {
          desired="$$(psql_hot -Atc "SELECT COALESCE(string_agg(quote_ident(slot_name), ',' ORDER BY slot_name), '') FROM pg_replication_slots WHERE slot_type = 'physical' AND active AND NOT temporary;" || true)"
          current="$$(psql_hot -Atc "SHOW synchronized_standby_slots;" || true)"

          if [ "$${desired}" = "$${current}" ]; then
            return
          fi

          if [ -n "$${desired}" ]; then
            echo "Setting hot synchronized_standby_slots to $${desired}"
            psql_hot -v slots="$${desired}" <<'SQL'
        SELECT format('ALTER SYSTEM SET synchronized_standby_slots = %L', :'slots')\gexec
        SELECT pg_reload_conf();
        SQL
          else
            echo "Resetting hot synchronized_standby_slots because no active hot physical slots are visible"
            psql_hot <<'SQL'
        ALTER SYSTEM RESET synchronized_standby_slots;
        SELECT pg_reload_conf();
        SQL
          fi
        }

        configure_hot_publication() {
          psql_hot -v repl_password="$${LOGICAL_REPLICATION_PASSWORD}" <<SQL
        SELECT format('CREATE ROLE $${REPLICATION_USER} WITH LOGIN REPLICATION PASSWORD %L', :'repl_password')
        WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = '$${REPLICATION_USER}')\gexec
        ALTER ROLE $${REPLICATION_USER} WITH LOGIN REPLICATION PASSWORD :'repl_password';
        GRANT USAGE ON SCHEMA public TO $${REPLICATION_USER};
        GRANT SELECT ON ALL TABLES IN SCHEMA public TO $${REPLICATION_USER};
        ALTER DEFAULT PRIVILEGES FOR ROLE postgres IN SCHEMA public GRANT SELECT ON TABLES TO $${REPLICATION_USER};
        ALTER DEFAULT PRIVILEGES FOR ROLE admin IN SCHEMA public GRANT SELECT ON TABLES TO $${REPLICATION_USER};

        SELECT 'CREATE PUBLICATION $${PUBLICATION} FOR TABLE $${TABLES_CSV} WITH (publish_via_partition_root = true)'
        WHERE NOT EXISTS (SELECT 1 FROM pg_publication WHERE pubname = '$${PUBLICATION}')\gexec
        ALTER PUBLICATION $${PUBLICATION} SET TABLE $${TABLES_CSV};
        ALTER PUBLICATION $${PUBLICATION} SET (publish_via_partition_root = true);
        SQL
        }

        configure_cold_subscription() {
          subscription_exists="$$(psql_cold -Atc "SELECT 1 FROM pg_subscription WHERE subname = '$${SUBSCRIPTION}';")"
          if [ "$${subscription_exists}" = "1" ]; then
            psql_cold <<SQL
        ALTER SUBSCRIPTION $${SUBSCRIPTION} ENABLE;
        ALTER SUBSCRIPTION $${SUBSCRIPTION} REFRESH PUBLICATION WITH (copy_data = false);
        SQL
            return
          fi

          psql_cold -v repl_password="$${LOGICAL_REPLICATION_PASSWORD}" <<SQL
        SELECT format(
          'CREATE SUBSCRIPTION $${SUBSCRIPTION} CONNECTION %L PUBLICATION $${PUBLICATION} WITH (slot_name = %L, create_slot = true, enabled = true, copy_data = true, failover = true)',
          'host=$${HOT_HOST} port=$${HOT_PORT} dbname=$${DB_NAME} user=$${REPLICATION_USER} password=' || :'repl_password',
          '$${SUBSCRIPTION_SLOT}'
        )\gexec
        SQL
        }

        while true; do
          wait_for_primary hot "$${HOT_HOST}" "$${HOT_PORT}"
          wait_for_primary cold "$${COLD_HOST}" "$${COLD_PORT}"

          configure_hot_slots_guard || true
          wait_for_schemas
          configure_hot_publication
          configure_cold_subscription

          echo "Hot-to-cold logical replication is configured. Rechecking HA slot guard in 30s."
          sleep 30
        done

  kvrocks-1:
    <<: *kvrocks-common
    container_name: kvrocks-1
    networks:
      kvrocks-net:
        ipv4_address: 172.20.0.11
    command:
      - "--bind"
      - "0.0.0.0"
      - "--port"
      - "6666"
      - "--requirepass"
      - "${KVROCKS_PASSWORD:?Set KVROCKS_PASSWORD in .env}"
      - "--masterauth"
      - "${KVROCKS_PASSWORD:?Set KVROCKS_PASSWORD in .env}"
      - "--db-name"
      - "kvrocks-ha-dev"
      - "--dir"
      - "/var/lib/kvrocks"
      - "--slave-read-only"
      - "yes"
      - "--slave-serve-stale-data"
      - "yes"
      - "--slave-priority"
      - "100"
      - "--use-rsid-psync"
      - "yes"
      - "--replica-announce-ip"
      - "172.20.0.11"
      - "--replica-announce-port"
      - "6666"
    volumes:
      - kvrocks1-data:/var/lib/kvrocks
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:6666:6666"

  kvrocks-2:
    <<: *kvrocks-common
    container_name: kvrocks-2
    depends_on:
      - kvrocks-1
    networks:
      kvrocks-net:
        ipv4_address: 172.20.0.12
    command:
      - "--bind"
      - "0.0.0.0"
      - "--port"
      - "6666"
      - "--requirepass"
      - "${KVROCKS_PASSWORD:?Set KVROCKS_PASSWORD in .env}"
      - "--masterauth"
      - "${KVROCKS_PASSWORD:?Set KVROCKS_PASSWORD in .env}"
      - "--db-name"
      - "kvrocks-ha-dev"
      - "--dir"
      - "/var/lib/kvrocks"
      - "--slaveof"
      - "172.20.0.11 6666"
      - "--slave-read-only"
      - "yes"
      - "--slave-serve-stale-data"
      - "yes"
      - "--slave-priority"
      - "100"
      - "--use-rsid-psync"
      - "yes"
      - "--replica-announce-ip"
      - "172.20.0.12"
      - "--replica-announce-port"
      - "6666"
    volumes:
      - kvrocks2-data:/var/lib/kvrocks
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:6667:6666"

  kvrocks-3:
    <<: *kvrocks-common
    container_name: kvrocks-3
    depends_on:
      - kvrocks-1
    networks:
      kvrocks-net:
        ipv4_address: 172.20.0.13
    command:
      - "--bind"
      - "0.0.0.0"
      - "--port"
      - "6666"
      - "--requirepass"
      - "${KVROCKS_PASSWORD:?Set KVROCKS_PASSWORD in .env}"
      - "--masterauth"
      - "${KVROCKS_PASSWORD:?Set KVROCKS_PASSWORD in .env}"
      - "--db-name"
      - "kvrocks-ha-dev"
      - "--dir"
      - "/var/lib/kvrocks"
      - "--slaveof"
      - "172.20.0.11 6666"
      - "--slave-read-only"
      - "yes"
      - "--slave-serve-stale-data"
      - "yes"
      - "--slave-priority"
      - "90"
      - "--use-rsid-psync"
      - "yes"
      - "--replica-announce-ip"
      - "172.20.0.13"
      - "--replica-announce-port"
      - "6666"
    volumes:
      - kvrocks3-data:/var/lib/kvrocks
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:6668:6666"

  sentinel-1:
    <<: *sentinel-common
    container_name: sentinel-1
    environment:
      KVROCKS_PASSWORD: ${KVROCKS_PASSWORD:?Set KVROCKS_PASSWORD in .env}
    networks:
      kvrocks-net:
        ipv4_address: 172.20.0.21
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        cat > /data/sentinel.conf <<EOF
        port 26379
        protected-mode no
        dir /data

        sentinel resolve-hostnames no
        sentinel announce-hostnames no
        sentinel announce-ip 172.20.0.21

        sentinel monitor kvrocks-main 172.20.0.11 6666 2
        sentinel auth-pass kvrocks-main $${KVROCKS_PASSWORD}
        sentinel down-after-milliseconds kvrocks-main 5000
        sentinel failover-timeout kvrocks-main 60000
        sentinel parallel-syncs kvrocks-main 1
        EOF
        exec redis-server /data/sentinel.conf --sentinel
    volumes:
      - sentinel1-data:/data
    ports:
      - "${PATRONI_BIND_ADDR:-127.0.0.1}:26379:26379"

  sentinel-2:
    <<: *sentinel-common
    container_name: sentinel-2
    environment:
      KVROCKS_PASSWORD: ${KVROCKS_PASSWORD:?Set KVROCKS_PASSWORD in .env}
